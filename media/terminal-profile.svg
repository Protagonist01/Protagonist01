<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="550" viewBox="0 0 1200 550" role="img" aria-labelledby="title desc">
  <title id="title">Henry Fadeni terminal profile</title>
  <desc id="desc">A dark terminal-style GitHub profile card with a detailed ASCII portrait and engineering profile details.</desc>

  <style>
    .mono { font-family: "Cascadia Code", "SFMono-Regular", Consolas, "Liberation Mono", monospace; }
    .header { fill: #c9d1d9; font-size: 15px; font-weight: 600; }
    .host { fill: #c9d1d9; font-size: 16px; font-weight: 600; }
    .label { fill: #d29922; font-size: 14px; font-weight: 600; }
    .dots { fill: #484f58; font-size: 14px; }
    .value { fill: #79c0ff; font-size: 14px; }
    .value-green { fill: #7ee787; font-size: 14px; }
    .value-purple { fill: #d2a8ff; font-size: 14px; }
    .section { fill: #8b949e; font-size: 13px; }
  </style>

  <rect x="1" y="1" width="1198" height="548" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="2" />
  <text x="32" y="40" class="mono header">Protagonist01 / README.md</text>

  <g transform="translate(1148 25)" fill="none" stroke="#8b949e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
