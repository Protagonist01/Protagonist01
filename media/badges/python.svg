<svg xmlns="http://www.w3.org/2000/svg" width="80" height="32" viewBox="0 0 80 32">
  <defs>
    <!-- Subtle drop shadow glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00FF9C" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Cyberpunk pill background -->
  <rect x="1.5" y="1.5" width="77" height="29" rx="6" fill="#0d1117" stroke="#00FF9C" stroke-width="1.2" filter="url(#glow)"/>
  <!-- Decorative corner ticks for terminal/hacker vibe -->
  <line x1="6" y1="1.5" x2="12" y2="1.5" stroke="#00FF9C" stroke-width="1.5"/>
  <line x1="1.5" y1="6" x2="1.5" y2="12" stroke="#00FF9C" stroke-width="1.5"/>
  <!-- Text -->
  <text x="50%" y="17" dominant-baseline="middle" text-anchor="middle" fill="#c9d1d9" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji'" font-size="11" font-weight="600">Python</text>
</svg>